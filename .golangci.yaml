# Strict-but-pragmatic config. Tighten over time.
# golangci-lint v2 schema. See https://golangci-lint.run/docs/product/migration-guide

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck         # unchecked errors
    - govet            # standard go vet
    - ineffassign      # unused assignments
    - staticcheck      # bug catches + style (absorbs the v1 gosimple linter)
    - unused           # unused identifiers
    - revive           # configurable replacement for golint
    - gocritic         # opinionated checks
    - gosec            # security
    - misspell         # typos in comments/strings
    - unconvert        # unnecessary type conversions
    - prealloc         # preallocate slices when length is known
    - bodyclose        # http body close
    - goconst          # repeated string literals → consts
  settings:
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam      # noisy on small structs
        - rangeValCopy   # noisy on small structs
    gosec:
      excludes:
        - G115           # int conversion overflow — too noisy for SQLite ints
    goconst:
      # 5 keeps "domain word repeated across 4 cobra Use fields" out of
      # the noise (cobra subcommand names like "list" / "status"
      # /"new" inevitably collide). A real duplication still shows up.
      min-occurrences: 5
  exclusions:
    rules:
      # Tests can do things production code can't. staticcheck's
      # SA5011 trips on the `if x == nil { t.Fatal }; use x` pattern
      # since it doesn't model t.Fatal as terminal — fine for tests.
      - path: _test\.go
        linters: [errcheck, gosec, goconst, staticcheck]
      # cmd/ entrypoint is allowed to log and exit.
      - path: cmd/
        linters: [gocritic]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
