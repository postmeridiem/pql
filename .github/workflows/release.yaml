name: release

# Disabled: triggers reduced to workflow_dispatch (manual run only) while
# we iterate locally. Re-enable for tag-driven releases by restoring the
# push: tags: ['v*'] block below.
#
# on:
#   push:
#     tags: ['v*']
on:
  workflow_dispatch:

permissions:
  contents: write   # required to publish GitHub Releases
  packages: write
  id-token: write   # for keyless cosign signing once enabled

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
