# GoReleaser config. Publishes to GitHub Releases on tag push.

version: 2

project_name: pql

before:
  hooks:
    - go mod tidy

builds:
  - id: pql
    main: ./cmd/pql
    binary: pql
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/postmeridiem/pql/internal/version.Version={{.Version}}'
      - -X 'github.com/postmeridiem/pql/internal/version.Commit={{.ShortCommit}}'
      - -X 'github.com/postmeridiem/pql/internal/version.Date={{.Date}}'
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

# SBOM and signing — wired in CI when ci/release.sh grows install steps for
# syft and cosign. Local `make snapshot` shouldn't require either.
# sboms:
#   - artifacts: archive
# signs:
#   - cmd: cosign
#     args:
#       - sign-blob
#       - '--output-signature=${signature}'
#       - '${artifact}'
#       - --yes
#     artifacts: checksum

release:
  github:
    owner: postmeridiem
    name: pql
  draft: false
  prerelease: auto
